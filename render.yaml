services:
  - type: web
    name: kenya-airways-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "kenya-airways-gbst.onrender.com"
      - key: DATABASE_URL
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: FRONTEND_URL
        value: "https://kenya-airways-six.vercel.app"
      - key: BACKEND_URL
        value: "https://kenya-airways-gbst.onrender.com"
      - key: CLOUDINARY_URL
        sync: false
